name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
    
    - name: Install dependencies
      run: |
        uv pip install --system fastapi pydantic-settings supabase python-multipart httpx uvicorn email-validator
        uv pip install --system pytest pytest-cov pytest-mock
    
    - name: Run tests
      env:
        SUPABASE_URL: https://placeholder.supabase.co
        SUPABASE_ANON_KEY: placeholder-anon-key
        SUPABASE_SERVICE_KEY: placeholder-service-key
      run: |
        pytest backend/tests/ -v -m unit --ignore=backend/tests/test_speech2text.py
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: success()
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      continue-on-error: true